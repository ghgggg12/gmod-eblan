problem.mat_hdr_level=Освещение с расширенным динамическим диапазоном (HDR) выключено. На некоторых картах не будет света.
problem.mat_bumpmap=Рельефное текстурирование выключено. Некоторые модели будут выглядеть хуево.
problem.mat_specular=Зеркальные отражения выключены. Некоторые модели будут выглядеть плохо.
problem.voice_fadeouttime=Настройка «voice_fadeouttime» имеет нестандартное значение, что может негативно отразиться на голосовом чате.
problem.mat_viewportscale=У вас установлено крошечное значение «mat_viewportscale», из-за чего играть может быть невозможно.
problem.cl_speeds=Настройки «cl_forwardspeed», «cl_sidespeed» или «cl_backspeed» неправильно настроены, что может негативно повлиять на передвижение игроков или опцию «Управлять» в режиме «Песочница».
problem.screen_res=Похоже, разрешение вашего экрана ниже рекомендуемого значения. Вы можете выбрать правильное разрешение для вашего монитора в настройках видео для более пиздатой игры.
problem.mat_dxlevel=Уровень DirectX установлен на неподдерживаемое значение «%i». Это может привести к нестабильности и очень хуевым графическим проблемам.
problem.missing_addon_file=Похоже, дополнению «%s» не удалось загрузиться или отсутствует часть его файлов. Убедитесь, что у вас достаточно места на диске, а затем проверьте целостность файлов игры через Steam, чтобы устранить проблему.
problem.menu_cleanupgmas=Мы нашли несколько неиспользуемых дополнений. Рекомендуется удалить их нахуй для экономии места на диске.
problem.gmod_mcore_test=Внимание: включён многоядерный рендеринг. Эта функция находится в стадии разработки и может вызывать хуйни с нестабильностью. Она автоматически включается в любой бета-ветке.
problem.addon_download_failed=Дополнению «%s» не удалось загрузиться: %s.\n\nПроверьте раздел загрузок Steam и убедитесь, что там нет хуйни.
problem.addon_conflict=Дополнение «%s», вероятно, конфликтует с дополнением «%s» из-за наличия у обоих следующих файлов:\n\n%s

problem.no_hdr=твой камень не поддерживает освещение с расширенным динамическим диапазоном (HDR). На некоторых картах не будет света.
problem.no_ps14=твой камень не поддерживает пиксельные шейдеры 1.4. Ожидайте серьёзные графические хуйни.
problem.no_ps20=твой камень не поддерживает пиксельные шейдеры 2.0. Ожидайте графические хуйни.
problem.no_vs20=твой камень не поддерживает вершинные шейдеры 2.0. Ожидайте графические хуйни.

